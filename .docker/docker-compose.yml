services:
  app:
    build:
      context: ..
      dockerfile: docker/node/Dockerfile
    container_name: meu-projeto-node-app
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: ["node", "src/server.js"]
    volumes:
      - ../app:/app
      - /app/node_modules

  db:
    image: postgres:18-alpine
    container_name: meu-projeto-node-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data: